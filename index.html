<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#191414" />
    <title>Spotify Starter</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">Spotify</h1>
      <p class="app-subtitle">Clean starter template for your mobile UI.</p>
    </header>

<!--=============SIDEBAR starts here=================-->

    <aside class="sidebar">
      <div class="sidebar__header">
        <a href="#">
          <img
            src="./assets/icons/big/library.svg"
            alt="spotify-library-icon"
          />
        </a>
        <a href="#">My Library</a>
      </div>
      <nav class="sidebar__nav">
        <ul class="sidebar__list">
          <li class="sidebar__item sidebar__item--arrow">
            <a href="#">
              <div class="sidebar__link-left">
                <img src="./assets/icons/big/pin.svg" alt="pins-icon" />
                <span>Pins</span>
              </div>
              <span class="sidebar__arrow">
              <img src="./assets/icons/big/right.svg" alt="arrow-right">
              </span>
            </a>
          </li>
          <li class="sidebar__item sidebar__item--arrow">
            <a href="#">
               <div class="sidebar__link-left">
                <img src="./assets/icons/big/playlist.svg" alt="playlist-icon" />
                <span>Playlists</span>
              </div>
              <span class="sidebar__arrow">
              <img src="./assets/icons/big/right.svg" alt="arrow-right">
              </span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/like.svg"
                alt="spotify-liked-songs-icon"
              />
              <span>Liked songs</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/save.svg"
                alt="spotify-saved-songs-icon"
              />
              <span>Saves</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/album.svg"
                alt="spotify-album-songs-icon"
              />
              <span>Albums</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/folder.svg"
                alt="spotify-folders-icon"
              />
              <span>Folders</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/podcast.svg"
                alt="spotify-podcasts-icon"
              />
              <span>Podcasts</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/audiobook.svg"
                alt="spotify-audiobooks-icon"
              />
              <span>Audiobooks</span>
            </a>
          </li>
          <li class="sidebar__item">
            <a href="#">
              <img
                src="./assets/icons/big/artist.svg"
                alt="spotify-artists-icon"
              />
              <span>Artists</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

   <!--=============SIDEBAR ends here=================-->


    <main class="app-main">
      <section class="placeholder">
        <h2>Getting started</h2>
        <p>Use this space to build your new screens.</p>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
